<title>Fenster Portal — Interactive Blueprint</title>
<style>
:root{
  --canvas:#eef2f6; --card:#ffffff; --ink:#0f2739; --muted:#5c6f7e; --faint:#8698a6;
  --line:#dde5ec; --line2:#eaeff4; --brand:#1f7ac0; --brand-d:#155e97; --tint:#6ec0e5;
  --tint-bg:#e8f3fb; --rail:#12344d; --rail-2:#0d2739; --rail-line:#1e4763; --rail-txt:#a9c4d6;
  --ok:#2e9e6b; --ok-bg:#e4f5ec; --warn:#e0871c; --warn-bg:#fdf1e0; --dang:#d13f3f; --dang-bg:#fbe8e8;
  --radius:10px; --radius-s:7px;
  --f-ui:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  --f-mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--canvas);color:var(--ink);font-family:var(--f-ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
::selection{background:#bfe0f4}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:290px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/3;display:flex;align-items:center;gap:14px;padding:0 18px;background:var(--rail);color:#fff;border-bottom:1px solid var(--rail-2);z-index:5}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.02em}
.brand .logo{display:inline-grid;grid-template-columns:repeat(2,9px);gap:2px}
.brand .logo i{width:9px;height:9px;border-radius:2px;display:block}
.brand .logo i:nth-child(1){background:var(--tint)}
.brand .logo i:nth-child(2){background:#cfe8f6}
.brand .logo i:nth-child(3){background:#2e6f9e}
.brand .logo i:nth-child(4){background:var(--tint)}
.brand small{font-weight:400;color:var(--rail-txt);letter-spacing:0}
.topbar .spacer{flex:1}
.topbar .modenote{font-size:12px;color:var(--rail-txt);display:flex;align-items:center;gap:7px}
.topbar .modenote b{color:#dcebf5;font-weight:600}
.acct{display:flex;align-items:center;gap:9px;padding:5px 10px;border:1px solid var(--rail-line);border-radius:20px;font-size:12.5px}
.acct .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--tint),var(--brand));display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff}

/* ---------- Sidebar ---------- */
.side{background:var(--rail-2);color:var(--rail-txt);overflow-y:auto;padding:10px 0 40px;border-right:1px solid var(--rail-2)}
.side::-webkit-scrollbar{width:9px}.side::-webkit-scrollbar-thumb{background:#1c405a;border-radius:6px}
.side .grp{padding:14px 18px 5px;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:#5f8199;font-weight:700}
.side a{display:flex;align-items:center;gap:9px;justify-content:space-between;padding:7px 18px 7px 20px;color:var(--rail-txt);text-decoration:none;font-size:13px;border-left:3px solid transparent;cursor:pointer}
.side a .lbl{display:flex;align-items:center;gap:9px}
.side a .en{font-size:11px;color:#597c93}
.side a:hover{background:#123449;color:#dcebf5}
.side a.active{background:#123c56;color:#fff;border-left-color:var(--tint);font-weight:600}
.side a.active .en{color:#89b3cc}
.side .rt{font-family:var(--f-mono);font-size:10.5px;color:#4d7a99}
.side .pill{font-size:9.5px;padding:1px 6px;border-radius:10px;background:#123c56;color:#7fb2d1;border:1px solid var(--rail-line)}

/* ---------- Main ---------- */
.main{overflow-y:auto;padding:0}
.main::-webkit-scrollbar{width:11px}.main::-webkit-scrollbar-thumb{background:#c4d2dd;border-radius:7px}
.wrap{max-width:1080px;margin:0 auto;padding:22px 30px 90px}
.specstrip{display:flex;flex-wrap:wrap;align-items:baseline;gap:10px 14px;padding:14px 0 16px;border-bottom:1px solid var(--line);margin-bottom:22px}
.specstrip h1{margin:0;font-size:22px;letter-spacing:-.01em;text-wrap:balance}
.specstrip h1 .en{color:var(--faint);font-weight:500;font-size:15px;margin-left:8px}
.route{font-family:var(--f-mono);font-size:12px;color:var(--brand-d);background:var(--tint-bg);border:1px solid #cde6f6;padding:2px 9px;border-radius:20px}
.purpose{flex-basis:100%;color:var(--muted);font-size:13.5px;max-width:70ch}
.gate{font-size:11px;font-weight:600;color:#7a5b12;background:var(--warn-bg);border:1px solid #f0d9ad;padding:2px 9px;border-radius:20px}

/* ---------- Screen (mock UI) ---------- */
.screen{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(16,39,57,.04),0 10px 26px -18px rgba(16,39,57,.22);overflow:hidden}
.screen .sc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line2);background:linear-gradient(#fff,#fbfdfe)}
.screen .sc-head h2{margin:0;font-size:16px}
.screen .sc-head .desc{font-size:12.5px;color:var(--muted);margin-top:2px}
.screen .sc-body{padding:20px}

/* toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 11px;color:var(--faint);font-size:13px;min-width:min(420px,60%);background:#fbfdfe}
.search svg{flex:0 0 auto}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:default;white-space:nowrap}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-d)}
.btn.ghost{background:transparent}
.btn.dang{color:var(--dang);border-color:#eec3c3;background:var(--dang-bg)}
.btn.sm{padding:4px 9px;font-size:12px;border-radius:6px}
.btn.sub{color:var(--brand-d);border-color:#cde6f6;background:var(--tint-bg)}
.savebar{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--line2)}
.actions-row{display:flex;flex-wrap:wrap;gap:10px}

/* tables */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-s)}
table.grid{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
table.grid th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:#f7fafc;white-space:nowrap}
table.grid td{padding:11px 12px;border-bottom:1px solid var(--line2);vertical-align:top}
table.grid tr:last-child td{border-bottom:0}
table.grid tbody tr:nth-child(even){background:#fbfdfe}
.num{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.caret{display:inline-grid;place-items:center;width:26px;height:24px;border:1px solid var(--line);border-radius:6px;color:var(--muted);font-weight:700}
.empty{padding:26px;text-align:center;color:var(--faint);font-size:13px;font-style:italic}
.cust{line-height:1.35}.cust b{font-weight:600}.cust .mut{color:var(--muted);font-size:12px}
.mapc{color:var(--brand);font-size:12px}

/* fields */
.panel{border:1px solid var(--line);border-radius:var(--radius-s);margin-bottom:16px;overflow:hidden}
.panel>.ph{padding:11px 16px;background:#f7fafc;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:space-between}
.panel>.pb{padding:6px 16px 14px}
.frow{padding:12px 0;border-bottom:1px solid var(--line2);display:grid;grid-template-columns:minmax(180px,240px) 1fr;gap:18px;align-items:start}
.frow:last-child{border-bottom:0}
.frow .fl{font-weight:600;font-size:13px}
.frow .fl .en{display:block;color:var(--faint);font-weight:400;font-size:11.5px}
.frow .help{color:var(--muted);font-size:12px;margin-top:5px;max-width:60ch}
.ctrl{display:block;width:100%;max-width:440px;border:1px solid var(--line);border-radius:7px;padding:8px 11px;background:#fff;color:var(--ink);font-size:13px;min-height:36px}
.ctrl.ta{min-height:74px;white-space:pre-wrap;color:#33475a}
.ctrl.ro{background:#f5f8fa;color:var(--muted)}
.ctrl.sel{display:flex;align-items:center;justify-content:space-between;color:#33475a}
.ctrl.sel::after{content:"▾";color:var(--faint);margin-left:10px}
.opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.opt{font-size:11.5px;border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--muted);background:#fbfdfe}
.opt.on{border-color:var(--brand);color:var(--brand-d);background:var(--tint-bg);font-weight:600}
.checks{display:flex;flex-wrap:wrap;gap:14px}
.chk{display:flex;align-items:center;gap:8px;font-size:13px}
.chk .box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--faint);display:inline-block}
.chk .box.on{background:var(--brand);border-color:var(--brand);position:relative}
.chk .box.on::after{content:"✓";color:#fff;font-size:11px;position:absolute;top:-2px;left:2px}
.toggle{width:38px;height:22px;border-radius:20px;background:var(--brand);position:relative;flex:0 0 auto}
.toggle::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;right:3px}
.toggle.off{background:#c4d2dd}.toggle.off::after{left:3px;right:auto}
.radio{display:flex;flex-direction:column;gap:8px}
.rad{display:flex;align-items:center;gap:9px;font-size:13px}
.rad .dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--faint);flex:0 0 auto}
.rad.on .dot{border-color:var(--brand);border-width:4px}
.swatch{width:20px;height:20px;border-radius:5px;border:1px solid rgba(0,0,0,.15);display:inline-block;vertical-align:-4px}
.note{background:#f7fafc;border:1px solid var(--line2);border-left:3px solid var(--tint);border-radius:0 6px 6px 0;padding:10px 13px;color:var(--muted);font-size:12.5px;margin:4px 0 12px}

/* task lines */
.tlines{border:1px solid var(--line);border-radius:var(--radius-s);overflow:hidden}
.tlines .tlh,.tline{display:grid;grid-template-columns:1fr 92px 78px auto;gap:12px;align-items:center;padding:10px 13px}
.tlines .tlh{background:#f7fafc;border-bottom:1px solid var(--line);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:700}
.tline{border-bottom:1px solid var(--line2)}
.tline .d{display:flex;align-items:center;gap:9px}
.catchip{width:20px;height:20px;border-radius:5px;display:inline-grid;place-items:center;color:#fff;font-size:11px;font-weight:700;flex:0 0 auto}
.tmini{font-size:11px;color:var(--faint);margin-top:2px}
.tsum{display:flex;justify-content:flex-end;gap:26px;padding:11px 13px;font-size:13px;background:#fbfdfe}

/* chips / pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap}
.pill.ok{background:var(--ok-bg);color:#1c6e49}
.pill.warn{background:var(--warn-bg);color:#8a5410}
.pill.dang{background:var(--dang-bg);color:#9e2b2b}
.pill.neu{background:#eef2f6;color:var(--muted)}
.pill.plan{background:#efe7fb;color:#5b3ba6}

/* calendar */
.calbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg span{padding:6px 11px;font-size:12.5px;color:var(--muted);border-right:1px solid var(--line)}
.seg span:last-child{border-right:0}.seg span.on{background:var(--brand);color:#fff;font-weight:600}
.calgrid{display:grid;grid-template-columns:52px repeat(7,1fr);border:1px solid var(--line);border-radius:var(--radius-s);overflow:hidden;font-size:11px}
.calgrid .ch{background:#f7fafc;border-bottom:1px solid var(--line);border-left:1px solid var(--line2);padding:7px 6px;text-align:center}
.calgrid .ch.tl{border-left:0}
.calgrid .ch b{display:block;font-size:12px;color:var(--ink)}
.calgrid .ch .kr{color:var(--faint);font-variant-numeric:tabular-nums}
.calgrid .tcell{border-left:0;border-top:1px solid var(--line2);color:var(--faint);text-align:right;padding:4px 6px;min-height:44px}
.calgrid .cell{border-left:1px solid var(--line2);border-top:1px solid var(--line2);min-height:44px;position:relative;padding:2px}
.ev{border-radius:5px;padding:4px 6px;font-size:10.5px;line-height:1.25;border-left:3px solid;margin-bottom:2px}
.ev .t{font-variant-numeric:tabular-nums;color:#33475a}
.ev b{display:block}
.ev.sub{background:#e8f3fb;border-color:var(--brand)}
.ev.done{background:#e4f5ec;border-color:var(--ok)}
.ev.fail{background:#fbe8e8;border-color:var(--dang)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:11.5px;color:var(--muted)}
.legend .li{display:flex;align-items:center;gap:6px}
.legend .sw{width:22px;height:12px;border-radius:3px;border-left:3px solid}

/* KPI */
.kpigrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kpi{border:1px solid var(--line);border-radius:var(--radius-s);padding:15px 16px;background:linear-gradient(#fff,#fbfdfe)}
.kpi .k{font-size:26px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kpi .t{font-weight:600;font-size:13px;margin-top:3px}
.kpi .s{color:var(--muted);font-size:11.5px;margin-top:5px}
.charts{display:grid;grid-template-columns:1fr;gap:14px;margin-top:18px}
.chartcard{border:1px solid var(--line);border-radius:var(--radius-s);padding:15px 16px}
.chartcard h3{margin:0 0 4px;font-size:14px}
.bars{display:flex;align-items:flex-end;gap:7px;height:120px;margin-top:14px;padding-top:6px;border-bottom:1px solid var(--line)}
.bars .bar{flex:1;background:linear-gradient(var(--tint),var(--brand));border-radius:4px 4px 0 0;min-width:8px}

/* wizard */
.steps{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.step{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:5px 13px}
.step .n{width:19px;height:19px;border-radius:50%;background:#eef2f6;display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--muted)}
.step.on{border-color:var(--brand);color:var(--brand-d);background:var(--tint-bg)}
.step.on .n{background:var(--brand);color:#fff}

/* misc */
.subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.varlist{display:grid;gap:7px}
.var{font-family:var(--f-mono);font-size:12px;color:var(--brand-d);background:var(--tint-bg);border:1px solid #cde6f6;border-radius:6px;padding:6px 9px}
.var .d{display:block;font-family:var(--f-ui);color:var(--muted);font-size:11.5px;margin-top:2px}
.tag{font-family:var(--f-mono);font-size:12px;background:#f2f5f8;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#3a5266}
.hr{height:1px;background:var(--line2);margin:18px 0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:920px){.two{grid-template-columns:1fr}.frow{grid-template-columns:1fr;gap:6px}.app{grid-template-columns:74px 1fr}.side .lbl .txt,.side .en,.side .grp span{display:none}}

/* overview */
.ov-hero{background:linear-gradient(120deg,var(--rail),#17496b);color:#fff;border-radius:var(--radius);padding:26px 28px;margin-bottom:22px}
.ov-hero h1{margin:0 0 8px;font-size:26px;letter-spacing:-.02em}
.ov-hero p{margin:0;color:#bcd6e6;max-width:75ch;font-size:14px}
.ov-hero .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.ov-hero .mchip{font-size:12px;background:rgba(255,255,255,.08);border:1px solid var(--rail-line);border-radius:20px;padding:4px 12px;color:#dcebf5}
.mapgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.mapcard{border:1px solid var(--line);border-radius:var(--radius-s);background:#fff;overflow:hidden}
.mapcard .mh{padding:11px 15px;background:#f7fafc;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.mapcard ul{list-style:none;margin:0;padding:6px 0}
.mapcard li a{display:flex;justify-content:space-between;gap:10px;padding:6px 15px;text-decoration:none;color:var(--ink);font-size:13px;cursor:pointer}
.mapcard li a:hover{background:var(--tint-bg);color:var(--brand-d)}
.mapcard li a .r{font-family:var(--f-mono);font-size:10.5px;color:var(--faint)}
.flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:10px 0 0;font-size:12.5px;color:var(--muted)}
.flow .fnode{background:#fff;border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-weight:600;color:var(--ink)}
.flow .fa{color:var(--tint)}
</style>

<div class="app">
  <div class="topbar">
    <div class="brand"><span class="logo"><i></i><i></i><i></i><i></i></span> Karltoffel <small>· inspired by Fenster</small></div>
    <div class="spacer"></div>
    <div class="modenote">🗺️ <b>Interactive blueprint</b> — reconstructed 1:1 from the live logged-in portal</div>
    <div class="acct"><span class="av">KK</span> KRLTFL ApS ▾</div>
  </div>
  <nav class="side" id="side"></nav>
  <main class="main"><div class="wrap" id="view"></div></main>
</div>

<script>
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
var META = {}; /* route -> {label,en,route,purpose,gate} */

/* ============================ RENDER ENGINE ============================ */
function btnRow(btns){return '<div class="actions-row">'+btns.map(function(b){return '<span class="btn '+(b[1]||'')+'">'+esc(b[0])+'</span>';}).join('')+'</div>';}
function optChips(opts,on){if(!opts||!opts.length)return '';return '<div class="opts">'+opts.map(function(o,i){return '<span class="opt'+(on===i?' on':'')+'">'+esc(o)+'</span>';}).join('')+'</div>';}
var WIDE={note:1,subtable:1,tasklines:1,sum:1,gatecard:1,meters:1};

function fieldControl(f){
 switch(f.t){
  case 'text': case 'number': case 'date':
    return '<div class="ctrl'+(f.ro?' ro':'')+'">'+(f.pw?'••••••••':(esc(f.val)|| (f.t==='date'?'<span style="color:#8698a6">dd-mm-åååå</span>':'<span style="color:#c2ced8">—</span>')))+'</div>';
  case 'textarea': return '<div class="ctrl ta">'+(esc(f.val)||'<span style="color:#c2ced8">—</span>')+'</div>';
  case 'richtext': return '<div class="ctrl ta" style="min-height:90px">'+esc(f.val)+'</div>';
  case 'picker': return '<div class="ctrl ta" style="color:#8698a6;min-height:44px">Klik for at fremsøge eller oprette ny kontakt</div>';
  case 'select': return '<div class="ctrl sel">'+esc(f.val||'—')+'</div>'+optChips(f.opts);
  case 'colorsel': return '<div class="ctrl sel"><span><span class="swatch" style="background:'+esc(f.hex)+'"></span> '+esc(f.val)+'</span></div>'+optChips(f.opts);
  case 'color': return '<div style="display:flex;align-items:center;gap:10px"><span class="swatch" style="width:34px;height:28px;background:'+esc(f.val)+'"></span><div class="ctrl" style="max-width:150px">'+esc(f.val)+'</div></div>';
  case 'toggle': return '<div style="display:flex;align-items:center;gap:10px"><span class="toggle'+(f.on?'':' off')+'"></span><span style="font-size:13px;color:var(--muted)">'+(f.on?'Ja':'Nej')+'</span></div>';
  case 'checks': return '<div class="checks">'+f.opts.map(function(o,i){var on=(f.on||[]).indexOf(i)>=0;return '<label class="chk"><span class="box'+(on?' on':'')+'"></span>'+esc(o)+'</label>';}).join('')+'</div>';
  case 'radio': return '<div class="radio">'+f.opts.map(function(o,i){return '<div class="rad'+(f.on===i?' on':'')+'"><span class="dot"></span>'+esc(o)+'</div>';}).join('')+'</div>';
  case 'static': return '<div class="ctrl ro" style="min-height:auto;white-space:pre-wrap">'+esc(f.val).replace(/\n/g,'<br>')+'</div>';
  default: return '';
 }
}
function renderField(f){
 var help=f.help?'<div class="help">'+esc(f.help)+'</div>':'';
 // full-width kinds
 if(f.t==='note') return '<div class="note">'+esc(f.val)+'</div>';
 if(f.t==='gatecard') return '<div class="note" style="border-left-color:var(--warn);background:var(--warn-bg);color:#7a5b12;font-weight:500">⚠ '+esc(f.val)+'</div>';
 if(f.t==='tasklines') return renderTasklines(f)+help;
 if(f.t==='sum') return '<div class="tlines" style="margin-top:10px"><div class="tsum"><span style="font-weight:600">Sum</span><span class="num">'+esc(f.price)+' kr</span><span class="num">'+esc(f.dur)+' min</span><span style="color:var(--muted)">Timepris '+esc(f.rate)+'</span></div></div>';
 if(f.t==='subtable') return (f.l?'<div class="fl" style="margin:4px 0 8px">'+esc(f.l)+'</div>':'')+renderTable(f.cols,f.rows,f.rowActions,f.empty)+ (f.help?help:'');
 if(f.t==='meters') return '<div style="display:grid;gap:13px">'+f.rows.map(function(r){var w=Math.max(2,Math.round(r[1]/r[2]*100));return '<div><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+esc(r[0])+'</span><span class="num" style="color:var(--muted)">'+esc(r[1])+' af kapacitet på '+esc(r[2])+'</span></div><div style="height:8px;background:#eef2f6;border-radius:6px;margin-top:6px;overflow:hidden"><div style="height:100%;width:'+w+'%;background:var(--brand)"></div></div></div>';}).join('')+'</div>';
 if(f.t==='buttons' && !f.l) return btnRow(f.btns)+help;
 // two-column row
 var lbl='<div class="fl">'+esc(f.l||'')+(f.en?'<span class="en">'+esc(f.en)+'</span>':'')+(f.gate?' <span class="gate">'+esc(f.gate)+'</span>':'')+'</div>';
 var ctrl=(f.t==='buttons')?btnRow(f.btns):fieldControl(f);
 return '<div class="frow">'+lbl+'<div>'+ctrl+help+'</div></div>';
}
function renderTasklines(f){
 var head='<div class="tlh"><span>Opgavebeskrivelse</span><span class="num">Pris</span><span class="num">Min.</span><span></span></div>';
 var body=f.rows.map(function(r){
   var mini=[r.badge,r.rate?('Timepris '+r.rate):'',r.interval?('Interval: '+r.interval):'',r.next?('Næste: '+r.next):''].filter(Boolean).join(' · ');
   return '<div class="tline"><div class="d">'+chip(r.cat,r.l)+'<div>'+esc(r.desc)+'<div class="tmini">'+esc(mini)+'</div></div></div><div class="num">'+esc(r.price)+'</div><div class="num">'+esc(r.dur)+'</div><div><span class="caret">⋯</span></div></div>';
 }).join('');
 return '<div class="tlines">'+head+body+'</div><div style="margin-top:9px"><span class="btn sm sub">+ Tilføj opgave</span></div>';
}
function renderTable(cols,rows,rowActions,empty){
 var th='<tr>'+(rowActions?'<th style="width:34px"></th>':'')+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>';
 var body='';
 if(!rows||!rows.length){ body='<tr><td colspan="'+(cols.length+(rowActions?1:0))+'"><div class="empty">'+esc(empty||'Ingen data')+'</div></td></tr>'; }
 else body=rows.map(function(r){
   var tds=r.map(function(cell,i){
     if(cell && typeof cell==='object' && cell.cust){ return '<td><div class="cust"><b>'+esc(cell.cust[0])+'</b>'+cell.cust.slice(1).map(function(x){return '<div class="mut">'+esc(x)+'</div>';}).join('')+'<div class="mapc">📍 Åbn i Google Maps</div></div></td>'; }
     var isNum=/^[\d.\-]|kr|%/.test(String(cell))&&i>0&&String(cell).indexOf('<')<0&&String(cell).length<14;
     return '<td'+(isNum?' class="num"':'')+'>'+(String(cell).indexOf('<')>=0?cell:esc(cell))+'</td>';
   }).join('');
   return '<tr>'+(rowActions?'<td><span class="caret" title="'+esc(rowActions.join(' · '))+'">⋯</span></td>':'')+tds+'</tr>';
 }).join('');
 return '<div class="tblwrap"><table class="grid"><thead>'+th+'</thead><tbody>'+body+'</tbody></table></div>'+
  (rowActions?'<div style="margin-top:7px;font-size:11.5px;color:var(--faint)">Rækkehandlinger (⋯): '+esc(rowActions.join(' · '))+'</div>':'');
}

function renderPage(route){
 var p=PAGES[route]; var m=META[route]||{}; var view=document.getElementById('view');
 if(!p){ view.innerHTML='<div class="specstrip"><h1>'+esc(m.label||route)+'</h1></div><div class="note">Side under kortlægning.</div>'; return; }
 var strip='';
 if(route!=='overview'){
   strip='<div class="specstrip"><h1>'+esc(m.label||'')+(m.en?'<span class="en">'+esc(m.en)+'</span>':'')+'</h1>'+(route.indexOf('/')===0?'<span class="route">'+esc(route)+'</span>':'')+((p.gate||m.gate)?'<span class="gate">Kræver '+esc(p.gate||m.gate)+'</span>':'')+(p.purpose?'<div class="purpose">'+esc(p.purpose)+'</div>':'')+'</div>';
 }
 view.innerHTML=strip+p.blocks.map(renderBlock).join('<div style="height:16px"></div>');
 document.querySelector('.main').scrollTop=0;
 view.querySelectorAll('a[data-route]').forEach(function(a){a.addEventListener('click',function(){go(a.getAttribute('data-route'));});});
}

function buildSide(){
 var s=document.getElementById('side'); var html='';
 NAV.forEach(function(g){
   if(g.grp) html+='<div class="grp"><span>'+esc(g.grp)+'</span></div>';
   g.items.forEach(function(it){
     html+='<a data-route="'+esc(it[0])+'" title="'+esc(it[0])+'"><span class="lbl"><span class="txt">'+esc(it[1])+'</span></span>'+(it[3]?'<span class="pill">'+esc(it[3])+'</span>':'')+'</a>';
   });
 });
 s.innerHTML=html;
 s.querySelectorAll('a[data-route]').forEach(function(a){a.addEventListener('click',function(){go(a.getAttribute('data-route'));});});
}
var current='overview';
function go(route){
 current=route;
 try{location.hash=encodeURIComponent(route);}catch(e){}
 document.querySelectorAll('#side a').forEach(function(a){a.classList.toggle('active',a.getAttribute('data-route')===route);});
 renderPage(route);
}
function init(){
 buildSide();
 var h=''; try{h=decodeURIComponent((location.hash||'').replace(/^#/,''));}catch(e){}
 go(PAGES[h]?h:'overview');
}
window.addEventListener('hashchange',function(){var h='';try{h=decodeURIComponent((location.hash||'').replace(/^#/,''));}catch(e){} if(h&&h!==current&&PAGES[h])go(h);});
init();
</script>
